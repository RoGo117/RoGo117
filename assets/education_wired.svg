<svg width="1200" height="650" viewBox="0 0 1200 650" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Formación de Rodrigo Moreno Bielsa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="48%" stop-color="#071426"/>
      <stop offset="100%" stop-color="#0b2a44"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".16"/>
      <stop offset="65%" stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".36"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="1" fill="#ffffff" opacity=".045"/>
      <rect y="2.5" width="5" height="1" fill="#000000" opacity=".20"/>
    </pattern>
    <style>
      .mono{font-family:'Courier New',Consolas,monospace}
      .ui{font-family:'Segoe UI',Arial,sans-serif}
      .title{fill:#e0f2fe;font-weight:800}
      .cyan{fill:#7dd3fc;filter:url(#softGlow)}
      .soft{fill:#bfdbfe}
      .muted{fill:#8ab6d6}
      .dim{fill:#5b83a0}
      .card{fill:#06111f;stroke:#164e63;stroke-width:2}
      .card2{fill:#081827;stroke:#1f6f91;stroke-width:1.5}
      .dot{fill:#7dd3fc;filter:url(#softGlow)}
      .line{stroke:#2563eb;stroke-width:4}
      .cursor{fill:#7dd3fc;animation:blink .85s steps(1) infinite}
      .pulse{animation:pulse 2.4s ease-in-out infinite;transform-origin:center}
      .float{animation:float 5.5s ease-in-out infinite;transform-origin:center}
      .fade1{animation:fade 9s ease-in-out infinite}
      .fade2{animation:fade 9s ease-in-out infinite;animation-delay:.7s}
      .fade3{animation:fade 9s ease-in-out infinite;animation-delay:1.4s}
      .scan{animation:scan 4.2s linear infinite}
      @keyframes blink{50%{opacity:0}}
      @keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
      @keyframes fade{0%,8%{opacity:0;transform:translateY(8px)}18%,82%{opacity:1;transform:translateY(0)}94%,100%{opacity:.62}}
      @keyframes scan{0%{transform:translateX(-220px)}100%{transform:translateX(1220px)}}
    </style>
  </defs>

  <rect width="1200" height="650" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="650" rx="28" fill="url(#scanlines)"/>
  <rect width="1200" height="650" rx="28" fill="url(#glow)"/>

  <rect x="34" y="34" width="1132" height="582" rx="20" class="card"/>
  <rect x="34" y="34" width="1132" height="56" rx="20" fill="#071426"/>
  <circle cx="70" cy="62" r="7" fill="#38bdf8"/>
  <circle cx="96" cy="62" r="7" fill="#60a5fa" opacity=".72"/>
  <circle cx="122" cy="62" r="7" fill="#bfdbfe" opacity=".45"/>
  <text x="160" y="68" class="mono muted" font-size="18">/home/RoGo117/education.timeline</text>

  <text x="60" y="128" class="ui title" font-size="34">🎓 Formación</text>
  <text x="60" y="162" class="mono cyan" font-size="20">&gt; cargando trayectoria académica...</text>
  <rect x="60" y="184" width="1080" height="2" fill="url(#cyanLine)" opacity=".75"/>
  <rect x="-180" y="181" width="180" height="8" fill="#7dd3fc" opacity=".26" class="scan"/>

  <g class="float">
    <path d="M160 250 V535" class="line" opacity=".7"/>
    <circle cx="160" cy="250" r="16" class="dot pulse"/>
    <circle cx="160" cy="392" r="16" class="dot pulse"/>
    <circle cx="160" cy="535" r="16" class="dot pulse"/>
  </g>

  <g class="fade1">
    <rect x="210" y="215" width="865" height="105" rx="16" class="card2"/>
    <text x="240" y="255" class="ui title" font-size="25">Curso de Especialización en Big Data e Inteligencia Artificial</text>
    <text x="240" y="288" class="mono soft" font-size="19">IES Maestre de Calatrava · Septiembre 2025 - Junio 2026</text>
    <text x="240" y="314" class="mono muted" font-size="17">Python · análisis de datos · Machine Learning · Jupyter · Power BI · Streamlit</text>
    <rect x="970" y="242" width="74" height="36" rx="18" fill="#0b2a44" stroke="#7dd3fc"/>
    <text x="990" y="266" class="mono cyan" font-size="16">NOW</text>
  </g>

  <g class="fade2">
    <rect x="210" y="357" width="865" height="105" rx="16" class="card2"/>
    <text x="240" y="397" class="ui title" font-size="25">CFGS - Desarrollo de Aplicaciones Web</text>
    <text x="240" y="430" class="mono soft" font-size="19">IES Ribera del Tajo · Septiembre 2023 - Junio 2025</text>
    <text x="240" y="456" class="mono muted" font-size="17">Frontend · Backend · bases de datos · aplicaciones web · proyectos reales</text>
    <rect x="958" y="384" width="86" height="36" rx="18" fill="#0b2a44" stroke="#7dd3fc"/>
    <text x="978" y="408" class="mono cyan" font-size="16">DAW</text>
  </g>

  <g class="fade3">
    <rect x="210" y="500" width="865" height="105" rx="16" class="card2"/>
    <text x="240" y="540" class="ui title" font-size="25">CFGM - Sistemas Microinformáticos y Redes</text>
    <text x="240" y="573" class="mono soft" font-size="19">IES Ribera del Tajo · Septiembre 2021 - Junio 2023</text>
    <text x="240" y="599" class="mono muted" font-size="17">Sistemas · redes · soporte técnico · mantenimiento · incidencias</text>
    <rect x="958" y="527" width="86" height="36" rx="18" fill="#0b2a44" stroke="#7dd3fc"/>
    <text x="978" y="551" class="mono cyan" font-size="16">SMR</text>
  </g>

  <text x="60" y="595" class="mono dim" font-size="15">EDUCATION_CHAIN: STABLE · DATA SOURCE: CV_PROFILE · LINK_STATUS: ACTIVE</text>
  <rect x="664" y="575" width="12" height="21" class="cursor"/>
</svg>
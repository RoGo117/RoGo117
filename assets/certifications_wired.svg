<svg width="1200" height="780" viewBox="0 0 1200 780" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Certificaciones AWS Academy de Rodrigo Moreno Bielsa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="52%" stop-color="#071426"/>
      <stop offset="100%" stop-color="#0b2a44"/>
    </linearGradient>

    <linearGradient id="awsOrange" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>

    <linearGradient id="cyanLine" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="42%" r="78%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".16"/>
      <stop offset="64%" stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".35"/>
    </radialGradient>

    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scanlines" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="1" fill="#ffffff" opacity=".045"/>
      <rect y="2.5" width="5" height="1" fill="#000000" opacity=".20"/>
    </pattern>

    <style>
      .mono{font-family:'Courier New',Consolas,monospace}
      .ui{font-family:'Segoe UI',Arial,sans-serif}
      .title{fill:#e0f2fe;font-weight:800}
      .cyan{fill:#7dd3fc;filter:url(#softGlow)}
      .soft{fill:#bfdbfe}
      .muted{fill:#9cc7e6}
      .dim{fill:#6b91ad}
      .card{fill:#06111f;stroke:#164e63;stroke-width:2}
      .card2{fill:#081827;stroke:#1f6f91;stroke-width:1.7}
      .tag{fill:#0b2a44;stroke:#7dd3fc;stroke-width:1.2}
      .cursor{fill:#7dd3fc;animation:blink .85s steps(1) infinite}
      .pulse{animation:pulse 2.2s ease-in-out infinite;transform-origin:center}
      .float{animation:float 5.2s ease-in-out infinite;transform-origin:center}
      .scan{animation:scan 3.8s linear infinite}
      @keyframes blink{50%{opacity:0}}
      @keyframes pulse{0%,100%{opacity:.58;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      @keyframes scan{0%{transform:translateX(-220px)}100%{transform:translateX(1220px)}}
    </style>
  </defs>

  <rect width="1200" height="780" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="780" rx="28" fill="url(#scanlines)"/>
  <rect width="1200" height="780" rx="28" fill="url(#glow)"/>

  <rect x="34" y="34" width="1132" height="710" rx="20" class="card"/>
  <rect x="34" y="34" width="1132" height="56" rx="20" fill="#071426"/>

  <circle cx="70" cy="62" r="7" fill="#38bdf8"/>
  <circle cx="96" cy="62" r="7" fill="#60a5fa" opacity=".72"/>
  <circle cx="122" cy="62" r="7" fill="#bfdbfe" opacity=".45"/>
  <text x="160" y="68" class="mono muted" font-size="18">/home/RoGo117/certifications.aws</text>

  <text x="60" y="130" class="ui title" font-size="38">Certificaciones</text>
  <text x="60" y="166" class="mono cyan" font-size="21">&gt; validando credenciales AWS Academy...</text>

  <rect x="60" y="194" width="1080" height="2" fill="url(#cyanLine)" opacity=".75"/>
  <rect x="-180" y="191" width="180" height="8" fill="#7dd3fc" opacity=".25" class="scan"/>

  <!-- Card 1 -->
  <g>
    <rect x="78" y="245" width="1044" height="190" rx="20" class="card2"/>

    <g class="float">
      <rect x="125" y="292" width="140" height="96" rx="18" fill="#111827" stroke="url(#awsOrange)" stroke-width="2.4"/>
      <text x="150" y="333" class="ui title" font-size="34">AWS</text>
      <path d="M153 353 C178 377 220 377 249 353" stroke="url(#awsOrange)" stroke-width="7" fill="none" stroke-linecap="round"/>
      <circle cx="257" cy="349" r="5.5" fill="#fbbf24"/>
    </g>

    <text x="310" y="296" class="ui title" font-size="29">AWS Academy Graduate</text>
    <text x="310" y="338" class="mono soft" font-size="23">Cloud Foundations</text>

    <text x="310" y="377" class="mono muted" font-size="18">Fundamentos de cloud, servicios AWS, arquitectura, seguridad</text>
    <text x="310" y="405" class="mono muted" font-size="18">y conceptos base para trabajar con soluciones en la nube.</text>

    <rect x="960" y="289" width="118" height="34" rx="17" class="tag"/>
    <text x="984" y="312" class="mono cyan" font-size="16">CLOUD</text>
  </g>

  <!-- Card 2 -->
  <g>
    <rect x="78" y="475" width="1044" height="190" rx="20" class="card2"/>

    <g class="float">
      <rect x="125" y="522" width="140" height="96" rx="18" fill="#111827" stroke="url(#awsOrange)" stroke-width="2.4"/>
      <text x="150" y="563" class="ui title" font-size="34">AWS</text>
      <circle cx="171" cy="590" r="7" class="cyan pulse"/>
      <circle cx="212" cy="571" r="7" class="cyan pulse"/>
      <circle cx="241" cy="604" r="7" class="cyan pulse"/>
      <path d="M178 587 L207 574 L234 600" stroke="#7dd3fc" stroke-width="3"/>
    </g>

    <text x="310" y="526" class="ui title" font-size="29">AWS Academy Graduate</text>
    <text x="310" y="568" class="mono soft" font-size="23">Machine Learning Foundations</text>

    <text x="310" y="607" class="mono muted" font-size="18">Bases de Machine Learning, tratamiento de datos, modelos,</text>
    <text x="310" y="635" class="mono muted" font-size="18">entrenamiento, evaluación e inteligencia artificial aplicada.</text>

    <rect x="960" y="519" width="118" height="34" rx="17" class="tag"/>
    <text x="992" y="542" class="mono cyan" font-size="16">ML/IA</text>
  </g>

  <rect x="60" y="696" width="1080" height="1.5" fill="url(#cyanLine)" opacity=".55"/>
  <text x="60" y="724" class="mono dim" font-size="16">CERT_STATUS: ACTIVE · ISSUER: AWS Academy · PROFILE: RoGo117</text>
  <rect x="563" y="705" width="12" height="21" class="cursor"/>
</svg>
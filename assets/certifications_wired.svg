<svg width="1200" height="480" viewBox="0 0 1200 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Certificaciones AWS Academy de Rodrigo Moreno Bielsa">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="54%" stop-color="#071426"/>
      <stop offset="100%" stop-color="#0b2a44"/>
    </linearGradient>
    <linearGradient id="awsOrange" x1="0" x2="1">
      <stop offset="0%" stop-color="#ff9900"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="cyanLine" x1="0" x2="1">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity=".15"/>
      <stop offset="65%" stop-color="#0f172a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".35"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="scanlines" width="5" height="5" patternUnits="userSpaceOnUse">
      <rect width="5" height="1" fill="#ffffff" opacity=".045"/>
      <rect y="2.5" width="5" height="1" fill="#000000" opacity=".20"/>
    </pattern>
    <style>
      .mono{font-family:'Courier New',Consolas,monospace}
      .ui{font-family:'Segoe UI',Arial,sans-serif}
      .title{fill:#e0f2fe;font-weight:800}
      .cyan{fill:#7dd3fc;filter:url(#softGlow)}
      .soft{fill:#bfdbfe}
      .muted{fill:#8ab6d6}
      .card{fill:#06111f;stroke:#164e63;stroke-width:2}
      .card2{fill:#081827;stroke:#1f6f91;stroke-width:1.5}
      .cursor{fill:#7dd3fc;animation:blink .85s steps(1) infinite}
      .pulse{animation:pulse 2.2s ease-in-out infinite;transform-origin:center}
      .float{animation:float 5.2s ease-in-out infinite;transform-origin:center}
      .fadeA{animation:fade 8s ease-in-out infinite}
      .fadeB{animation:fade 8s ease-in-out infinite;animation-delay:.9s}
      .scan{animation:scan 3.8s linear infinite}
      @keyframes blink{50%{opacity:0}}
      @keyframes pulse{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
      @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
      @keyframes fade{0%,8%{opacity:.55;transform:translateY(6px)}20%,82%{opacity:1;transform:translateY(0)}94%,100%{opacity:.72}}
      @keyframes scan{0%{transform:translateX(-220px)}100%{transform:translateX(1220px)}}
    </style>
  </defs>

  <rect width="1200" height="480" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="480" rx="28" fill="url(#scanlines)"/>
  <rect width="1200" height="480" rx="28" fill="url(#glow)"/>

  <rect x="34" y="34" width="1132" height="412" rx="20" class="card"/>
  <rect x="34" y="34" width="1132" height="56" rx="20" fill="#071426"/>
  <circle cx="70" cy="62" r="7" fill="#38bdf8"/>
  <circle cx="96" cy="62" r="7" fill="#60a5fa" opacity=".72"/>
  <circle cx="122" cy="62" r="7" fill="#bfdbfe" opacity=".45"/>
  <text x="160" y="68" class="mono muted" font-size="18">/home/RoGo117/certifications.aws</text>

  <text x="60" y="128" class="ui title" font-size="34">🏅 Certificaciones</text>
  <text x="60" y="162" class="mono cyan" font-size="20">&gt; validando credenciales AWS Academy...</text>
  <rect x="60" y="184" width="1080" height="2" fill="url(#cyanLine)" opacity=".75"/>
  <rect x="-180" y="181" width="180" height="8" fill="#7dd3fc" opacity=".26" class="scan"/>

  <g class="fadeA">
    <rect x="80" y="225" width="490" height="160" rx="18" class="card2"/>
    <g class="float">
      <rect x="112" y="258" width="102" height="82" rx="16" fill="#111827" stroke="url(#awsOrange)" stroke-width="2"/>
      <text x="130" y="292" class="ui title" font-size="28">AWS</text>
      <path d="M133 307 C150 326 178 326 198 307" stroke="url(#awsOrange)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <circle cx="205" cy="305" r="5" fill="#fbbf24"/>
    </g>
    <text x="245" y="268" class="ui title" font-size="24">AWS Academy Graduate</text>
    <text x="245" y="304" class="mono soft" font-size="20">Cloud Foundations</text>
    <text x="245" y="337" class="mono muted" font-size="17">Fundamentos de cloud, servicios AWS, arquitectura y conceptos base.</text>
    <rect x="245" y="352" width="112" height="26" rx="13" fill="#0b2a44" stroke="#7dd3fc"/>
    <text x="263" y="370" class="mono cyan" font-size="14">CLOUD</text>
  </g>

  <g class="fadeB">
    <rect x="630" y="225" width="490" height="160" rx="18" class="card2"/>
    <g class="float">
      <rect x="662" y="258" width="102" height="82" rx="16" fill="#111827" stroke="url(#awsOrange)" stroke-width="2"/>
      <text x="680" y="292" class="ui title" font-size="28">AWS</text>
      <circle cx="694" cy="318" r="6" class="cyan pulse"/>
      <circle cx="724" cy="306" r="6" class="cyan pulse"/>
      <circle cx="738" cy="330" r="6" class="cyan pulse"/>
      <path d="M700 316 L720 308 L735 327" stroke="#7dd3fc" stroke-width="2"/>
    </g>
    <text x="795" y="268" class="ui title" font-size="24">AWS Academy Graduate</text>
    <text x="795" y="304" class="mono soft" font-size="20">Machine Learning Foundations</text>
    <text x="795" y="337" class="mono muted" font-size="17">Bases de Machine Learning, datos, modelos y conceptos de IA aplicada.</text>
    <rect x="795" y="352" width="112" height="26" rx="13" fill="#0b2a44" stroke="#7dd3fc"/>
    <text x="818" y="370" class="mono cyan" font-size="14">ML/IA</text>
  </g>

  <text x="60" y="424" class="mono muted" font-size="16">CERT_STATUS: ACTIVE · ISSUER: AWS Academy · PROFILE: RoGo117</text>
  <rect x="563" y="404" width="12" height="21" class="cursor"/>
</svg>
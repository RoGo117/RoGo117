<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mensaje final terminal">
  <defs>
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0%" stop-color="#010409"/>
      <stop offset="50%" stop-color="#082f49"/>
      <stop offset="100%" stop-color="#010409"/>

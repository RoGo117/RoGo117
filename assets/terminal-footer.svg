  </defs>
  <rect width="1200" height="220" rx="28" fill="url(#bg)"/>
  <text x="70" y="80" class="t h" font-size="28">$ contact --professional</text>
  <text x="70" y="130" class="t w" font-size="24">LinkedIn: rodrigo-moreno-bielsa  |  GitHub: RoGo117</text>
  <text x="70" y="175" class="t h" font-size="24">Siempre aprendiendo, construyendo y mejorando</text>
  <rect x="690" y="154" width="14" height="27" class="h blink"/>
</svg>
